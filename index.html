<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercise Library</title>
<style>
:root {
  --bg: #F4F7F0;
  --card: #FFFFFF;
  --border: #DDE5D5;
  --green: #3D7A10;
  --green-dim: rgba(61,122,16,0.09);
  --green-mid: rgba(61,122,16,0.22);
  --coral: #C04018;
  --coral-dim: rgba(192,64,24,0.09);
  --amber: #9A6000;
  --amber-dim: rgba(154,96,0,0.09);
  --sky: #1070A0;
  --sky-dim: rgba(16,112,160,0.09);
  --purple: #6040A0;
  --purple-dim: rgba(96,64,160,0.09);
  --text: #1A2010;
  --text-dim: #7A8C6E;
  --text-mid: #506040;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif; -webkit-font-smoothing:antialiased; }

.header { background:#1A2E10; padding:24px 20px 16px; }
.header h1 { font-family:Georgia,serif; font-size:24px; font-weight:700; color:#fff; margin-bottom:2px; }
.header-sub { font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:14px; }
.header-row { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
.ex-count-badge { background:rgba(184,224,74,0.2); color:#B8E04A; font-size:11px; font-weight:700; padding:4px 12px; border-radius:20px; }
.search-wrap { position:relative; }
.search-input { width:100%; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15); border-radius:12px; padding:10px 14px 10px 36px; font-size:14px; color:#fff; outline:none; font-family:inherit; }
.search-input::placeholder { color:rgba(255,255,255,0.38); }
.search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:15px; pointer-events:none; }

.filters { display:flex; gap:7px; padding:12px 16px; overflow-x:auto; scrollbar-width:none; background:#fff; border-bottom:1px solid var(–border); box-shadow:0 1px 4px rgba(0,0,0,0.05); }
.filters::-webkit-scrollbar { display:none; }
.fb { flex-shrink:0; padding:7px 15px; border-radius:20px; border:1.5px solid var(–border); background:#fff; font-size:12px; font-weight:600; color:var(–text-dim); cursor:pointer; font-family:inherit; transition:all .18s; white-space:nowrap; }
.fb.active { background:var(–green-dim); border-color:var(–green); color:var(–green); }

.content { padding:14px 14px 80px; max-width:520px; margin:0 auto; }

.cat-header { display:flex; align-items:center; gap:10px; margin:22px 0 11px; }
.cat-icon { width:32px; height:32px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
.cat-title { font-family:Georgia,serif; font-size:18px; font-weight:700; }
.cat-cnt { font-size:11px; color:var(–text-dim); margin-left:auto; font-weight:600; }

.ex-card { background:var(–card); border:1px solid var(–border); border-radius:18px; margin-bottom:10px; overflow:hidden; box-shadow:0 1px 6px rgba(0,0,0,0.05); }
.ex-header { display:flex; align-items:center; gap:12px; padding:13px 14px; cursor:pointer; }
.thumb { width:66px; height:66px; border-radius:11px; overflow:hidden; background:var(–bg); flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.thumb-ph { font-size:28px; display:flex; align-items:center; justify-content:center; width:100%; height:100%; }
.ex-info { flex:1; min-width:0; }
.ex-name { font-size:14px; font-weight:700; margin-bottom:3px; }
.ex-muscle-label { font-size:11px; color:var(–text-dim); margin-bottom:5px; }
.tags { display:flex; gap:4px; flex-wrap:wrap; }
.tag { font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; }
.tag.machine { background:var(–sky-dim); color:var(–sky); }
.tag.dumbbell { background:var(–purple-dim); color:var(–purple); }
.tag.bodyweight { background:var(–green-dim); color:var(–green); }
.tag.barbell { background:var(–amber-dim); color:var(–amber); }
.tag.cable { background:var(–sky-dim); color:var(–sky); }
.tag.beginner { background:var(–green-dim); color:var(–green); }
.tag.intermediate { background:var(–amber-dim); color:var(–amber); }
.xbtn { width:28px; height:28px; border-radius:50%; border:1.5px solid var(–border); background:none; color:var(–text-dim); font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; }
.xbtn.open { background:var(–green); border-color:var(–green); color:#fff; transform:rotate(45deg); }

.detail { display:none; border-top:1px solid var(–border); }
.detail.open { display:block; }
.gif-wrap { width:100%; aspect-ratio:16/9; background:#EDF1E8; overflow:hidden; display:flex; align-items:center; justify-content:center; position:relative; }
.gif-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
.gif-info { text-align:center; padding:20px 16px; }
.gif-icon { font-size:40px; margin-bottom:8px; }
.gif-yt { font-size:13px; color:var(–text-dim); line-height:1.7; margin-bottom:12px; }
.gif-yt strong { color:var(–text); }
.gif-load-btn { background:var(–green); color:#fff; border:none; border-radius:20px; padding:8px 20px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; }
.gif-load-btn:active { opacity:0.8; }

.dbody { padding:15px; }
.dlabel { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(–text-dim); font-weight:700; margin-bottom:8px; }
.dsec { margin-bottom:14px; }

.stat3 { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.stat3-chip { background:var(–bg); border-radius:11px; padding:10px 8px; text-align:center; border:1px solid var(–border); }
.stat3-v { font-family:Georgia,serif; font-size:17px; font-weight:700; color:var(–green); }
.stat3-l { font-size:9px; color:var(–text-dim); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }

.mchips { display:flex; gap:6px; flex-wrap:wrap; }
.mchip { font-size:12px; padding:3px 11px; border-radius:20px; font-weight:600; }
.mchip.p { background:var(–green-dim); color:var(–green); border:1px solid var(–green-mid); }
.mchip.s { background:var(–bg); color:var(–text-dim); border:1px solid var(–border); }

.steps-list { list-style:none; }
.steps-list li { display:flex; gap:10px; padding:7px 0; border-bottom:1px solid var(–bg); font-size:13px; line-height:1.6; }
.steps-list li:last-child { border-bottom:none; }
.snum { width:20px; height:20px; border-radius:50%; background:var(–green); color:#fff; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }

.tip-row { background:var(–green-dim); border-radius:11px; padding:10px 12px; margin-bottom:6px; display:flex; gap:8px; }
.tip-row .ti { font-size:14px; flex-shrink:0; margin-top:1px; }
.tip-row .tt { font-size:13px; color:var(–text); line-height:1.6; }
.warn-row { background:var(–coral-dim); border-radius:11px; padding:10px 12px; margin-bottom:6px; display:flex; gap:8px; }
.warn-row .wi { font-size:14px; flex-shrink:0; margin-top:1px; }
.warn-row .wt { font-size:13px; color:var(–coral); line-height:1.6; font-weight:500; }

.empty-state { text-align:center; padding:50px 20px; color:var(–text-dim); font-size:14px; line-height:1.8; }
</style>

</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <h1>Exercise Library</h1>
      <div class="header-sub">คลังท่าออกกำลังกาย พร้อมรูป + Tips</div>
    </div>
    <div class="ex-count-badge" id="excnt">38 ท่า</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search" placeholder="ค้นหา เช่น squat, chest, glute..." oninput="doFilter()">
  </div>
</div>

<div class="filters">
  <button class="fb active" onclick="setF('all',this)">ทั้งหมด</button>
  <button class="fb" onclick="setF('upper',this)">💪 Upper</button>
  <button class="fb" onclick="setF('lower',this)">🦵 Lower</button>
  <button class="fb" onclick="setF('core',this)">🧘 Core</button>
  <button class="fb" onclick="setF('dumbbell',this)">🏋️ Dumbbell</button>
  <button class="fb" onclick="setF('machine',this)">⚙️ Machine</button>
  <button class="fb" onclick="setF('bodyweight',this)">🤸 Bodyweight</button>
  <button class="fb" onclick="setF('cable',this)">🔗 Cable</button>
</div>

<div class="content" id="content"></div>

let curFilter = 'all';

function getEmoji(cat) {
  if (cat === 'upper') return '💪';
  if (cat === 'lower') return '🦵';
  return '🧘';
}

function loadGif(id, src) {
  const wrap = document.getElementById('gif-' + id);
  if (!wrap) return;
  wrap.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:20px">กำลังโหลด...</div>';
  const img = new Image();
  img.onload = function() {
    wrap.innerHTML = '';
    wrap.appendChild(img);
    img.style.cssText = 'width:100%;height:100%;object-fit:cover';
  };
  img.onerror = function() {
    wrap.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-dim);font-size:13px">❌ โหลดรูปไม่ได้<br>ต้องเชื่อมต่อ internet ค่ะ</div>';
  };
  img.src = src;
}

function buildAll() {
  const cats = [
    { id:'upper', label:'Upper Body', emoji:'💪', color:'#3D7A10', bg:'#EDF7E5' },
    { id:'lower', label:'Lower Body', emoji:'🦵', color:'#1070A0', bg:'#E5F2F8' },
    { id:'core',  label:'Core & Cardio', emoji:'🧘', color:'#6040A0', bg:'#EEE8F8' },
  ];
  let html = '';
  cats.forEach(cat => {
    const items = EX.filter(e => e.cat === cat.id);
    html += `<div class="cat-section" data-cat="${cat.id}">
      <div class="cat-header">
        <div class="cat-icon" style="background:${cat.bg}">${cat.emoji}</div>
        <div class="cat-title" style="color:${cat.color}">${cat.label}</div>
        <div class="cat-cnt">${items.length} ท่า</div>
      </div>`;
    items.forEach(ex => { html += buildCard(ex); });
    html += '</div>';
  });
  document.getElementById('content').innerHTML = html;
  document.getElementById('excnt').textContent = EX.length + ' ท่า';
}

function buildCard(ex) {
  const tagHTML = ex.tags.map(t => `<span class="tag ${t}">${t}</span>`).join('');
  const stepsHTML = ex.steps.map((s,i) => `<li><div class="snum">${i+1}</div><span>${s}</span></li>`).join('');
  const tipsHTML = ex.tips.map(t => `<div class="tip-row"><div class="ti">💡</div><div class="tt">${t}</div></div>`).join('');
  const warnHTML = ex.warns.map(w => `<div class="warn-row"><div class="wi">⚠️</div><div class="wt">${w}</div></div>`).join('');
  const priChips = `<span class="mchip p">${ex.muscle}</span>`;
  const secChips = ex.sec.map(m => `<span class="mchip s">${m}</span>`).join('');
  return `<div class="ex-card" data-id="${ex.id}" data-cat="${ex.cat}" data-tags="${ex.tags.join(' ')}" data-name="${ex.name.toLowerCase()}">
    <div class="ex-header" onclick="toggleCard('${ex.id}')">
      <div class="thumb">
        <span class="thumb-ph">${getEmoji(ex.cat)}</span>
      </div>
      <div class="ex-info">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-muscle-label">${ex.muscle}</div>
        <div class="tags">${tagHTML}</div>
      </div>
      <button class="xbtn" id="xb-${ex.id}">+</button>
    </div>
    <div class="detail" id="det-${ex.id}">
      <div class="gif-wrap" id="gif-${ex.id}">
        <div class="gif-info">
          <div class="gif-icon">${getEmoji(ex.cat)}</div>
          <div class="gif-yt">🎬 ค้นหาท่าใน YouTube:<br><strong>${ex.name}</strong></div>
          <button class="gif-load-btn" onclick="loadGif('${ex.id}','${ex.img}')">โหลดรูป GIF</button>
        </div>
      </div>
      <div class="dbody">
        <div class="stat3">
          <div class="stat3-chip"><div class="stat3-v">${ex.sets}</div><div class="stat3-l">Sets</div></div>
          <div class="stat3-chip"><div class="stat3-v">${ex.reps}</div><div class="stat3-l">Reps</div></div>
          <div class="stat3-chip"><div class="stat3-v">${ex.rest}</div><div class="stat3-l">Rest</div></div>
        </div>
        <div class="dsec"><div class="dlabel">กล้ามเนื้อที่ใช้</div>
          <div class="mchips">${priChips}${secChips}</div></div>
        <div class="dsec"><div class="dlabel">วิธีทำ</div>
          <ul class="steps-list">${stepsHTML}</ul></div>
        <div class="dsec"><div class="dlabel">💡 Tips & Tricks</div>${tipsHTML}</div>
        <div class="dsec"><div class="dlabel">⚠️ ข้อควรระวัง</div>${warnHTML}</div>
      </div>
    </div>
  </div>`;
}

function toggleCard(id) {
  const det = document.getElementById('det-' + id);
  const btn = document.getElementById('xb-' + id);
  const wasOpen = det.classList.contains('open');
  document.querySelectorAll('.detail.open').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('.xbtn.open').forEach(b => b.classList.remove('open'));
  if (!wasOpen) {
    det.classList.add('open');
    btn.classList.add('open');
    setTimeout(() => det.scrollIntoView({behavior:'smooth', block:'nearest'}), 100);
  }
}

function setF(f, btn) {
  curFilter = f;
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  doFilter();
}

function doFilter() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let shown = 0;
  document.querySelectorAll('.ex-card').forEach(card => {
    const matchQ = !q || card.dataset.name.includes(q);
    const matchF = curFilter === 'all' || card.dataset.cat === curFilter || card.dataset.tags.includes(curFilter);
    const show = matchQ && matchF;
    card.style.display = show ? '' : 'none';
    if (show) shown++;
  });
  document.querySelectorAll('.cat-section').forEach(sec => {
    const any = [...sec.querySelectorAll('.ex-card')].some(c => c.style.display !== 'none');
    sec.style.display = any ? '' : 'none';
  });
  document.getElementById('excnt').textContent = shown + ' ท่า';
}

buildAll();
</script>
