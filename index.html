<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercise Library</title>
<style>
:root {
  --bg: #FFFFFF;
  --bg2: #F4F7F0;
  --card: #FFFFFF;
  --border: #DDE5D5;
  --green: #3D7A10;
  --green-dim: rgba(61,122,16,0.08);
  --green-mid: rgba(61,122,16,0.2);
  --coral: #C04018;
  --coral-dim: rgba(192,64,24,0.08);
  --amber: #B06010;
  --amber-dim: rgba(176,96,16,0.08);
  --sky: #1070A0;
  --sky-dim: rgba(16,112,160,0.08);
  --purple: #6040A0;
  --purple-dim: rgba(96,64,160,0.08);
  --text: #1A2010;
  --text-dim: #7A8C6E;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg2); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif; -webkit-font-smoothing:antialiased; }

/* HEADER */
.header { background:#1A2E10; padding:28px 20px 22px; position:sticky; top:0; z-index:100; }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.header h1 { font-family:Georgia,serif; font-size:26px; font-weight:700; color:#fff; }
.header-sub { font-size:12px; color:rgba(255,255,255,0.55); margin-top:2px; }
.ex-count { background:rgba(184,224,74,0.2); color:#B8E04A; font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; letter-spacing:1px; }

/* SEARCH */
.search-wrap { position:relative; margin-bottom:0; }
.search-input { width:100%; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15); border-radius:12px; padding:10px 16px 10px 38px; font-size:14px; color:#fff; outline:none; }
.search-input::placeholder { color:rgba(255,255,255,0.4); }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:16px; opacity:0.5; }

/* FILTER TABS */
.filter-wrap { display:flex; gap:8px; padding:14px 20px 12px; overflow-x:auto; scrollbar-width:none; background:#fff; border-bottom:1px solid var(–border); }
.filter-wrap::-webkit-scrollbar { display:none; }
.filter-btn { flex-shrink:0; padding:7px 16px; border-radius:20px; border:1.5px solid var(–border); background:#fff; font-size:12px; font-weight:600; color:var(–text-dim); cursor:pointer; transition:all 0.2s; white-space:nowrap; font-family:inherit; }
.filter-btn.active { border-color:var(–green); background:var(–green-dim); color:var(–green); }

/* CONTENT */
.content { padding:16px 16px 80px; max-width:520px; margin:0 auto; }

/* CATEGORY HEADER */
.cat-header { display:flex; align-items:center; gap:10px; margin:20px 0 12px; }
.cat-icon { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.cat-title { font-family:Georgia,serif; font-size:19px; font-weight:700; }
.cat-count { font-size:11px; color:var(–text-dim); margin-left:auto; font-weight:600; }

/* EXERCISE CARD */
.ex-card { background:var(–card); border:1px solid var(–border); border-radius:18px; margin-bottom:12px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.05); transition:box-shadow 0.2s; }
.ex-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.1); }

.ex-header { display:flex; align-items:center; gap:14px; padding:14px 16px; cursor:pointer; }
.ex-img-wrap { width:70px; height:70px; border-radius:12px; overflow:hidden; flex-shrink:0; background:var(–bg2); display:flex; align-items:center; justify-content:center; }
.ex-img-wrap img { width:100%; height:100%; object-fit:cover; }
.ex-img-placeholder { font-size:28px; }
.ex-info { flex:1; min-width:0; }
.ex-name { font-size:15px; font-weight:700; color:var(–text); margin-bottom:3px; }
.ex-muscle { font-size:12px; color:var(–text-dim); margin-bottom:6px; }
.ex-tags { display:flex; gap:5px; flex-wrap:wrap; }
.tag { font-size:10px; font-weight:600; padding:2px 8px; border-radius:10px; letter-spacing:0.5px; }
.tag.machine { background:var(–sky-dim); color:var(–sky); }
.tag.dumbbell { background:var(–purple-dim); color:var(–purple); }
.tag.bodyweight { background:var(–green-dim); color:var(–green); }
.tag.barbell { background:var(–amber-dim); color:var(–amber); }
.tag.cable { background:rgba(16,112,160,0.08); color:#1070A0; }
.tag.beginner { background:var(–green-dim); color:var(–green); }
.tag.intermediate { background:var(–amber-dim); color:var(–amber); }
.ex-expand-btn { width:28px; height:28px; border-radius:50%; border:1.5px solid var(–border); background:none; font-size:15px; color:var(–text-dim); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0; }
.ex-expand-btn.open { background:var(–green); border-color:var(–green); color:#fff; transform:rotate(45deg); }

/* DETAIL PANEL */
.ex-detail { display:none; border-top:1px solid var(–border); }
.ex-detail.open { display:block; }

.ex-gif-wrap { width:100%; aspect-ratio:16/9; background:#F0F4EC; overflow:hidden; display:flex; align-items:center; justify-content:center; }
.ex-gif-wrap img { width:100%; height:100%; object-fit:cover; }
.ex-gif-loading { text-align:center; color:var(–text-dim); font-size:13px; padding:30px; }
.ex-gif-loading .spin { display:inline-block; font-size:24px; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

.ex-body { padding:16px; }

.detail-section { margin-bottom:14px; }
.detail-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(–text-dim); font-weight:700; margin-bottom:8px; }

.how-to-list { list-style:none; }
.how-to-list li { display:flex; gap:10px; padding:6px 0; border-bottom:1px solid var(–bg2); font-size:13px; line-height:1.6; color:var(–text); }
.how-to-list li:last-child { border-bottom:none; }
.step-num { width:20px; height:20px; border-radius:50%; background:var(–green); color:#fff; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }

.tip-row { background:var(–green-dim); border-radius:12px; padding:10px 12px; margin-bottom:6px; display:flex; gap:8px; align-items:flex-start; }
.tip-row .tip-icon { font-size:14px; flex-shrink:0; margin-top:1px; }
.tip-row .tip-text { font-size:13px; color:var(–text); line-height:1.6; }

.warn-row { background:var(–coral-dim); border-radius:12px; padding:10px 12px; margin-bottom:6px; display:flex; gap:8px; align-items:flex-start; }
.warn-row .warn-icon { font-size:14px; flex-shrink:0; margin-top:1px; }
.warn-row .warn-text { font-size:13px; color:var(–coral); line-height:1.6; font-weight:500; }

.muscle-chips { display:flex; gap:6px; flex-wrap:wrap; }
.muscle-chip { font-size:12px; padding:4px 12px; border-radius:20px; font-weight:600; }
.muscle-chip.primary { background:var(–green-dim); color:var(–green); border:1px solid var(–green-mid); }
.muscle-chip.secondary { background:var(–bg2); color:var(–text-dim); border:1px solid var(–border); }

.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.stat-chip { background:var(–bg2); border-radius:12px; padding:10px; text-align:center; }
.stat-chip .sv { font-family:Georgia,serif; font-size:18px; font-weight:700; color:var(–green); }
.stat-chip .sl { font-size:10px; color:var(–text-dim); margin-top:2px; text-transform:uppercase; letter-spacing:1px; }

/* EMPTY */
.empty { text-align:center; padding:60px 20px; color:var(–text-dim); }
.empty-icon { font-size:40px; margin-bottom:12px; }

/* HIDDEN */
.ex-card[data-hidden=“true”] { display:none; }
.cat-section[data-hidden=“true”] { display:none; }
</style>

</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>Exercise Library</h1>
      <div class="header-sub">คลังท่าออกกำลังกาย พร้อมรูป + Tips</div>
    </div>
    <div class="ex-count" id="ex-count">45 ท่า</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search" placeholder="ค้นหาท่า เช่น squat, chest..." oninput="filterExercises()">
  </div>
</div>

<div class="filter-wrap">

  <button class="filter-btn" onclick="setFilter('upper',this)">💪 Upper</button>
  <button class="filter-btn" onclick="setFilter('lower',this)">🦵 Lower</button>
  <button class="filter-btn" onclick="setFilter('core',this)">🧘 Core</button>

  <button class="filter-btn" onclick="setFilter('bodyweight',this)">🤸 Bodyweight</button>
</div>

<div class="content" id="content">

</div>

let currentFilter = 'all';

function buildLibrary() {
  const categories = [
    { id:'upper', label:'💪 Upper Body', color:'#3D7A10', bg:'#F0F7EA', emoji:'💪' },
    { id:'lower', label:'🦵 Lower Body', color:'#1070A0', bg:'#EAF3F8', emoji:'🦵' },
    { id:'core',  label:'🧘 Core & Cardio', color:'#6040A0', bg:'#F0EAF8', emoji:'🧘' },
  ];

  const content = document.getElementById('content');
  let html = '';
  let totalShown = 0;

  categories.forEach(cat => {
    const exes = EXERCISES.filter(e => e.category === cat.id);
    totalShown += exes.length;
    html += `<div class="cat-section" data-cat="${cat.id}">
      <div class="cat-header">
        <div class="cat-icon" style="background:${cat.bg};color:${cat.color}">${cat.emoji}</div>
        <div class="cat-title" style="color:${cat.color}">${cat.label.replace(/^[^\s]+ /,'')}</div>
        <div class="cat-count">${exes.length} ท่า</div>
      </div>`;
    exes.forEach(ex => {
      html += buildCard(ex);
    });
    html += '</div>';
  });

  content.innerHTML = html;
  document.getElementById('ex-count').textContent = EXERCISES.length + ' ท่า';
}

function buildCard(ex) {
  const tagHTML = ex.tags.map(t => `<span class="tag ${t}">${t}</span>`).join('');
  const stepsHTML = ex.steps.map((s,i) => `<li><div class="step-num">${i+1}</div><span>${s}</span></li>`).join('');
  const tipsHTML = ex.tips.map(t => `<div class="tip-row"><div class="tip-icon">💡</div><div class="tip-text">${t}</div></div>`).join('');
  const warnHTML = ex.warnings.map(w => `<div class="warn-row"><div class="warn-icon">⚠️</div><div class="warn-text">${w}</div></div>`).join('');
  const primaryChips = ex.muscle.map(m => `<span class="muscle-chip primary">${m}</span>`).join('');
  const secondaryChips = ex.secondary.map(m => `<span class="muscle-chip secondary">${m}</span>`).join('');

  return `<div class="ex-card" data-id="${ex.id}" data-cat="${ex.category}" data-tags="${ex.tags.join(' ')}" data-name="${ex.name.toLowerCase()} ${ex.nameEn.toLowerCase()}">
    <div class="ex-header" onclick="toggleCard('${ex.id}')">
      <div class="ex-img-wrap">
        <img src="${ex.img}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="${ex.name}">
        <div class="ex-img-placeholder" style="display:none">💪</div>
      </div>
      <div class="ex-info">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-muscle">${ex.muscle[0]}</div>
        <div class="ex-tags">${tagHTML}</div>
      </div>
      <button class="ex-expand-btn" id="btn-${ex.id}">+</button>
    </div>
    <div class="ex-detail" id="detail-${ex.id}">
      <div class="ex-gif-wrap">
        <img src="${ex.img}" alt="${ex.name} animation" onerror="this.parentElement.innerHTML='<div class=\\'ex-gif-loading\\'>🔍 ค้นหาท่าใน YouTube: ${ex.nameEn}</div>'">
      </div>
      <div class="ex-body">
        <div class="stats-row" style="margin-bottom:16px">
          <div class="stat-chip"><div class="sv">${ex.sets}</div><div class="sl">Sets</div></div>
          <div class="stat-chip"><div class="sv">${ex.reps}</div><div class="sl">Reps</div></div>
          <div class="stat-chip"><div class="sv">${ex.rest}</div><div class="sl">Rest</div></div>
        </div>

        <div class="detail-section">
          <div class="detail-label">กล้ามเนื้อที่ใช้</div>
          <div class="muscle-chips">${primaryChips}${secondaryChips}</div>
        </div>

        <div class="detail-section">
          <div class="detail-label">วิธีทำ</div>
          <ul class="how-to-list">${stepsHTML}</ul>
        </div>

        <div class="detail-section">
          <div class="detail-label">💡 Tips & Tricks</div>
          ${tipsHTML}
        </div>

        <div class="detail-section">
          <div class="detail-label">⚠️ ข้อควรระวัง</div>
          ${warnHTML}
        </div>
      </div>
    </div>
  </div>`;
}

function toggleCard(id) {
  const detail = document.getElementById('detail-' + id);
  const btn = document.getElementById('btn-' + id);
  const isOpen = detail.classList.contains('open');
  // close all others
  document.querySelectorAll('.ex-detail.open').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('.ex-expand-btn.open').forEach(b => b.classList.remove('open'));
  if (!isOpen) {
    detail.classList.add('open');
    btn.classList.add('open');
    setTimeout(() => detail.scrollIntoView({behavior:'smooth', block:'nearest'}), 100);
  }
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterExercises();
}

function filterExercises() {
  const search = document.getElementById('search').value.toLowerCase().trim();
  let shown = 0;

  document.querySelectorAll('.ex-card').forEach(card => {
    const name = card.dataset.name || '';
    const cat = card.dataset.cat || '';
    const tags = card.dataset.tags || '';

    const matchSearch = !search || name.includes(search);
    const matchFilter = currentFilter === 'all'
      || cat === currentFilter
      || tags.includes(currentFilter);

    const visible = matchSearch && matchFilter;
    card.dataset.hidden = !visible;
    card.style.display = visible ? '' : 'none';
    if (visible) shown++;
  });

  // hide/show category sections
  document.querySelectorAll('.cat-section').forEach(sec => {
    const anyVisible = sec.querySelectorAll('.ex-card:not([style*="display: none"]):not([style*="display:none"])').length > 0;
    sec.style.display = anyVisible ? '' : 'none';
  });

  document.getElementById('ex-count').textContent = shown + ' ท่า';
}

buildLibrary();
